<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI Live Speech Translator @SPU v.1</title>

<style>

body{
font-family: Arial;
text-align:center;
padding:20px;
background:linear-gradient(120deg,#4facfe,#00f2fe);
color:white;
}

.box{
background:white;
color:black;
padding:15px;
margin:10px;
border-radius:10px;
font-size:22px;
}

select,button{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
margin:5px;
}

#micBtn{
background:#ff4b5c;
color:white;
font-size:20px;
}

</style>
</head>

<body>

<h2>🎤 SPU Translator V.1</h2>

<select id="from">
<option value="th-TH">ไทย</option>
<option value="zh-CN">จีน</option>
<option value="en-US">English</option>
<option value="ja-JP">日本語</option>
</select>

➡

<select id="to">
<option value="zh-CN">จีน</option>
<option value="th-TH">ไทย</option>
<option value="ja-JP">日本語</option>
</select>

<br>

<button id="micBtn" onclick="toggleMic()">🎤 เริ่มพูด</button>

<h3>ข้อความต้นฉบับ</h3>
<div id="original" class="box"></div>

<h3>คำแปล</h3>
<div id="translated" class="box"></div>

<h3>English Translation</h3>
<div id="english" class="box"></div>

<script>

let recognition
let running=false

function toggleMic(){

if(!running){

start()

document.getElementById("micBtn").innerText="🛑 หยุดพูด"
document.getElementById("micBtn").style.background="#28a745"

}else{

stop()

document.getElementById("micBtn").innerText="🎤 เริ่มพูด"
document.getElementById("micBtn").style.background="#ff4b5c"

}

}

function start(){

running=true

let from=document.getElementById("from").value

recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)()

recognition.lang=from
recognition.continuous=true
recognition.interimResults=true

recognition.onresult=function(event){

let text=event.results[event.results.length-1][0].transcript

document.getElementById("original").innerText=text

translate(text)

}

recognition.onend=function(){

if(running){
recognition.start()
}

}

recognition.start()

}

function stop(){

running=false

if(recognition){
recognition.stop()
}

}

async function translate(text){

let from=document.getElementById("from").value
let to=document.getElementById("to").value

from=from.split("-")[0]
to=to.split("-")[0]

let urlMain=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`

let resMain=await fetch(urlMain)
let dataMain=await resMain.json()

document.getElementById("translated").innerText=dataMain[0][0][0]

let urlEng=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=en&dt=t&q=${encodeURIComponent(text)}`

let resEng=await fetch(urlEng)
let dataEng=await resEng.json()

document.getElementById("english").innerText=dataEng[0][0][0]

}

</script>

</body>
</html>
